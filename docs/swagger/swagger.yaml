basePath: /
definitions:
  api.ConfigDiffResult:
    properties:
      access_rules:
        $ref: '#/definitions/api.DiffCounts'
      failover_groups:
        $ref: '#/definitions/api.DiffCounts'
      interfaces:
        $ref: '#/definitions/api.DiffCounts'
      object_groups:
        $ref: '#/definitions/api.DiffCounts'
    type: object
  api.DiffCounts:
    properties:
      add:
        type: integer
      change:
        type: integer
      keep:
        type: integer
      remove:
        type: integer
    type: object
  api.TopologyGraph:
    properties:
      links:
        items:
          $ref: '#/definitions/api.TopologyLink'
        type: array
      nodes:
        items:
          $ref: '#/definitions/api.TopologyNode'
        type: array
      stats:
        $ref: '#/definitions/api.TopologyStats'
    type: object
  api.TopologyLink:
    properties:
      hops:
        description: hop count
        type: integer
      snr:
        description: link quality
        type: number
      source:
        description: node ID
        type: string
      target:
        description: node ID
        type: string
    type: object
  api.TopologyNode:
    properties:
      battery:
        description: percent, 0 if unknown
        type: integer
      id:
        description: node ID (hex)
        type: string
      label:
        description: long name or short name
        type: string
      last_seen:
        description: unix timestamp
        type: integer
      lat:
        type: number
      lon:
        type: number
      online:
        description: seen in last 15 minutes
        type: boolean
      snr:
        description: last known SNR
        type: number
    type: object
  api.TopologyStats:
    properties:
      avg_snr:
        type: number
      online_nodes:
        type: integer
      total_links:
        type: integer
      total_nodes:
        type: integer
    type: object
  api.createLinkRequest:
    properties:
      dest_hash:
        type: string
    type: object
  api.deviceConfigVersionResponse:
    properties:
      comment:
        type: string
      created_at:
        type: string
      version:
        type: integer
      yaml:
        type: string
    type: object
  api.deviceResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      imei:
        type: string
      label:
        type: string
      last_seen:
        type: string
      notes:
        type: string
      status:
        type: string
      type:
        type: string
      updated_at:
        type: string
    type: object
  api.linkResponse:
    properties:
      created_at:
        type: string
      dest_hash:
        type: string
      is_initiator:
        type: boolean
      last_activity:
        type: string
      link_id:
        type: string
      state:
        type: string
    type: object
  api.routingDestinationResponse:
    properties:
      announce_count:
        type: integer
      dest_hash:
        type: string
      encryption_pub:
        type: string
      first_seen:
        type: string
      hop_count:
        type: integer
      last_seen:
        type: string
      signing_pub:
        type: string
      source_iface:
        type: string
    type: object
  backup.BackupDiff:
    properties:
      access_rules:
        $ref: '#/definitions/backup.DiffCounts'
      contacts:
        $ref: '#/definitions/backup.DiffCounts'
      device_configs:
        $ref: '#/definitions/backup.DiffCounts'
      devices:
        $ref: '#/definitions/backup.DiffCounts'
      failover_groups:
        $ref: '#/definitions/backup.DiffCounts'
      interfaces:
        $ref: '#/definitions/backup.DiffCounts'
      iridium_locations:
        $ref: '#/definitions/backup.DiffCounts'
      object_groups:
        $ref: '#/definitions/backup.DiffCounts'
      preset_messages:
        $ref: '#/definitions/backup.DiffCounts'
      satellite_rate_limits:
        $ref: '#/definitions/backup.DiffCounts'
      sim_cards:
        $ref: '#/definitions/backup.DiffCounts'
      system_config:
        $ref: '#/definitions/backup.DiffCounts'
    type: object
  backup.BackupInfo:
    properties:
      created_at:
        type: string
      filename:
        type: string
      size:
        type: integer
    type: object
  backup.DiffCounts:
    properties:
      add:
        type: integer
      change:
        type: integer
      remove:
        type: integer
    type: object
  database.DeadLetter:
    properties:
      created_at:
        type: string
      direction:
        description: outbound (mesh→sat) or inbound (sat→mesh)
        type: string
      id:
        type: integer
      last_error:
        type: string
      max_retries:
        type: integer
      next_retry:
        type: string
      packet_id:
        type: integer
      payload:
        items:
          type: integer
        type: array
      priority:
        description: 0=critical, 1=normal, 2=low
        type: integer
      retries:
        type: integer
      status:
        description: pending, sent, expired, cancelled, received
        type: string
      text_preview:
        description: plaintext for display (binary payload is not human-readable)
        type: string
      updated_at:
        type: string
    type: object
  database.MessageStats:
    properties:
      by_portnum:
        additionalProperties:
          type: integer
        type: object
      by_transport:
        additionalProperties:
          type: integer
        type: object
      newest_at:
        type: string
      oldest_at:
        type: string
      today:
        type: integer
      today_text:
        type: integer
      total:
        type: integer
    type: object
  database.SatelliteRateLimit:
    properties:
      burst_size:
        type: integer
      daily_limit:
        type: integer
      device_id:
        type: integer
      enabled:
        type: boolean
      monthly_limit:
        type: integer
      override_until:
        type: string
      refill_rate:
        type: number
      updated_at:
        type: string
    type: object
  transport.ChannelRequest:
    properties:
      downlink_enabled:
        type: boolean
      index:
        type: integer
      name:
        type: string
      psk:
        description: base64
        type: string
      role:
        type: string
      uplink_enabled:
        type: boolean
    type: object
  transport.MeshStatus:
    properties:
      address:
        type: string
      connected:
        type: boolean
      hw_model:
        type: integer
      hw_model_name:
        type: string
      node_id:
        type: string
      node_name:
        type: string
      num_nodes:
        type: integer
      transport:
        type: string
    type: object
  transport.SendRequest:
    properties:
      channel:
        type: integer
      text:
        type: string
      to:
        type: string
    type: object
  transport.SignalInfo:
    properties:
      assessment:
        description: '"none", "poor", "fair", "good", "excellent"'
        type: string
      bars:
        description: 0-5
        type: integer
      timestamp:
        type: string
    type: object
  transport.Waypoint:
    properties:
      description:
        type: string
      expire:
        type: integer
      icon:
        type: integer
      id:
        type: integer
      latitude:
        type: number
      longitude:
        type: number
      name:
        type: string
    type: object
host: localhost:6050
info:
  contact: {}
  description: Multi-channel communications gateway bridging Meshtastic, Iridium,
    Astrocast, Cellular, APRS, TAK, MQTT, ZigBee, and Webhooks.
  title: MeshSat API
  version: "1.0"
paths:
  /api/admin/factory_reset:
    post:
      consumes:
      - application/json
      description: Sends a factory reset command — all device state returned to defaults
      parameters:
      - description: Target node
        in: body
        name: body
        required: true
        schema:
          properties:
            node_id:
              format: int32
              type: integer
          type: object
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Factory reset a mesh node
      tags:
      - admin
  /api/admin/reboot:
    post:
      consumes:
      - application/json
      description: Forwards a reboot command through HAL to a local or remote mesh
        node
      parameters:
      - description: Target node and delay
        in: body
        name: body
        required: true
        schema:
          properties:
            delay_secs:
              type: integer
            node_id:
              format: int32
              type: integer
          type: object
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Reboot a mesh node
      tags:
      - admin
  /api/admin/traceroute:
    post:
      consumes:
      - application/json
      description: Sends a traceroute to discover the path to a destination node
      parameters:
      - description: Destination node
        in: body
        name: body
        required: true
        schema:
          properties:
            node_id:
              format: int32
              type: integer
          type: object
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Traceroute to a mesh node
      tags:
      - admin
  /api/backup/create:
    post:
      description: Exports all Hub configuration state (interfaces, rules, devices,
        contacts, encryption keys) as a ZIP archive. The backup is saved to disk and
        returned as a download.
      produces:
      - application/zip
      responses:
        "200":
          description: Backup ZIP archive
          schema:
            type: file
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create backup
      tags:
      - backup
  /api/backup/download/{filename}:
    get:
      description: Downloads a previously saved backup file by filename.
      parameters:
      - description: Backup filename
        in: path
        name: filename
        required: true
        type: string
      produces:
      - application/zip
      responses:
        "200":
          description: Backup ZIP archive
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Download backup
      tags:
      - backup
  /api/backup/list:
    get:
      description: Returns a list of backup files stored on disk, newest first.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/backup.BackupInfo'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List backups
      tags:
      - backup
  /api/backup/preview:
    post:
      consumes:
      - application/zip
      description: Uploads a backup ZIP and returns a diff summary showing what would
        be added, removed, or changed — without applying.
      parameters:
      - description: Backup ZIP file
        in: formData
        name: backup
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backup.BackupDiff'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Preview backup restore
      tags:
      - backup
  /api/backup/restore:
    post:
      consumes:
      - application/zip
      description: Uploads a backup ZIP and replaces all Hub configuration state.
        This is a full replace applied as a transaction. Use /api/backup/preview first
        to see what will change.
      parameters:
      - description: Backup ZIP file
        in: formData
        name: backup
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Restore result
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Restore from backup
      tags:
      - backup
  /api/backup/schedule:
    get:
      description: Returns the auto-backup schedule configuration.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get backup schedule
      tags:
      - backup
    put:
      consumes:
      - application/json
      description: Updates the auto-backup interval in hours. Set to 0 to disable.
        Takes effect on next restart.
      parameters:
      - description: interval_hours
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Set backup schedule
      tags:
      - backup
  /api/canned-messages:
    get:
      description: Requests the device to send back its canned messages via admin
        channel
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get canned messages
      tags:
      - config
    post:
      consumes:
      - application/json
      description: Sets the canned messages on the Meshtastic device. Messages are
        pipe-separated.
      parameters:
      - description: Pipe-separated canned messages (e.g. 'OK|Help|SOS')
        in: body
        name: body
        required: true
        schema:
          properties:
            messages:
              type: string
          type: object
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Set canned messages
      tags:
      - config
  /api/channels:
    post:
      consumes:
      - application/json
      description: Configures a Meshtastic radio channel via HAL
      parameters:
      - description: Channel configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/transport.ChannelRequest'
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Set channel configuration
      tags:
      - config
  /api/config:
    get:
      description: Retrieves the full Meshtastic device configuration via HAL
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get device configuration
      tags:
      - config
  /api/config/{section}:
    get:
      description: Requests a specific radio config section from the device (response
        arrives via config_complete SSE event)
      parameters:
      - description: 'Config section: device, position, power, network, display, lora,
          bluetooth, security'
        in: path
        name: section
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get config section
      tags:
      - config
  /api/config/diff:
    post:
      consumes:
      - application/yaml
      description: Accepts a YAML document and returns a diff summary showing what
        would be added, removed, changed, or kept — without applying any changes.
      parameters:
      - description: YAML configuration document
        in: body
        name: config
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ConfigDiffResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Preview configuration changes
      tags:
      - config
  /api/config/export:
    get:
      description: Returns a YAML document containing all interfaces, access rules,
        object groups, and failover groups. Excludes runtime fields (device_id, device_port,
        counters, timestamps).
      produces:
      - application/yaml
      responses:
        "200":
          description: YAML configuration document
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Export running configuration
      tags:
      - config
  /api/config/import:
    post:
      consumes:
      - application/yaml
      description: Accepts a YAML document and replaces all interfaces, access rules,
        object groups, and failover groups. This is a full replace (not merge) applied
        as a transaction.
      parameters:
      - description: YAML configuration document
        in: body
        name: config
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: Count of imported entities per type
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Import running configuration
      tags:
      - config
  /api/config/module:
    post:
      consumes:
      - application/json
      description: Sends a module configuration update to the Meshtastic device via
        HAL
      parameters:
      - description: Module config section and data
        in: body
        name: body
        required: true
        schema:
          properties:
            config:
              type: object
            section:
              type: string
          type: object
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Set module configuration
      tags:
      - config
  /api/config/module/{section}:
    get:
      description: Requests a specific module config section (response arrives via
        config_complete SSE event)
      parameters:
      - description: 'Module section: mqtt, serial, external_notification, store_forward,
          range_test, telemetry, canned_message, audio, remote_hardware, neighbor_info'
        in: path
        name: section
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get module config section
      tags:
      - config
  /api/config/radio:
    post:
      consumes:
      - application/json
      description: Sends a radio configuration update to the Meshtastic device via
        HAL
      parameters:
      - description: Radio config section and data
        in: body
        name: body
        required: true
        schema:
          properties:
            config:
              type: object
            section:
              type: string
          type: object
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Set radio configuration
      tags:
      - config
  /api/device-registry:
    get:
      description: Returns all registered devices with computed status (online/offline/never_seen).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.deviceResponse'
            type: array
      summary: List registered devices
      tags:
      - devices
    post:
      consumes:
      - application/json
      description: Registers a new device. Validates IMEI (15-digit Luhn check). Rejects
        duplicate IMEIs with 409.
      parameters:
      - description: Device data
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.deviceResponse'
        "400":
          description: invalid IMEI or missing fields
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: duplicate IMEI
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a registered device
      tags:
      - devices
  /api/device-registry/{id}:
    delete:
      description: Removes a device by ID.
      parameters:
      - description: Device ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a registered device
      tags:
      - devices
    get:
      description: Returns a single device by ID with computed status.
      parameters:
      - description: Device ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.deviceResponse'
        "400":
          description: invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a registered device
      tags:
      - devices
    put:
      consumes:
      - application/json
      description: Updates label, type, and notes of an existing device.
      parameters:
      - description: Device ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update data
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.deviceResponse'
        "400":
          description: invalid ID or JSON
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a registered device
      tags:
      - devices
  /api/device-registry/{id}/config:
    get:
      description: Returns the latest YAML configuration version for a device, or
        204 if no config exists.
      parameters:
      - description: Device ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
