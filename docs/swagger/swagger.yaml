      - description: Node ID (!hex format)
        in: query
        name: node
        type: string
      - description: Start time (RFC3339)
        in: query
        name: since
        type: string
      - description: End time (RFC3339)
        in: query
        name: until
        type: string
      - description: Max records (default 100, max 10000)
        in: query
        name: limit
        type: integer
      responses:
        "200":
          description: telemetry, node_id
          schema:
            additionalProperties: true
            type: object
      summary: Get telemetry history
      tags:
      - telemetry
  /api/topology:
