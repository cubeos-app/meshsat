  /api/webhook/rockblock:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: |-
        Receives MO (Mobile Originated) messages from the RockBLOCK webhook service.
        Verifies shared secret, hex-decodes payload, attempts SMAZ2 decompression,
        and publishes to MQTT hub namespace topics (mo/raw, mo/decoded, position).
      parameters:
      - description: RockBLOCK IMEI
        in: formData
        name: imei
        required: true
        type: string
      - description: MO message sequence number
        in: formData
        name: momsn
        required: true
        type: integer
      - description: Transmission time (YY-MM-DD HH:MM:SS)
        in: formData
        name: transmit_time
        required: true
        type: string
      - description: Iridium satellite latitude
        in: formData
        name: iridium_latitude
        required: true
        type: number
      - description: Iridium satellite longitude
        in: formData
        name: iridium_longitude
        required: true
        type: number
      - description: Circular error probable (km)
        in: formData
        name: iridium_cep
        required: true
        type: number
      - description: Hex-encoded payload
        in: formData
        name: data
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: malformed payload
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: invalid secret
          schema:
            additionalProperties:
              type: string
            type: object
      summary: RockBLOCK webhook receiver
      tags:
      - webhooks
