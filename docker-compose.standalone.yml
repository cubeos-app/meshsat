# True standalone mode — direct serial, no HAL sidecar required.
# Usage: docker compose -f docker-compose.standalone.yml up --build
services:
  meshsat:
    build: .
    ports:
      - "6050:6050"
    privileged: true
    environment:
      - MESHSAT_MODE=direct
      - MESHSAT_PORT=6050
      - MESHSAT_DB_PATH=/data/meshsat.db
      # Auto-detect ports by default; override to pin specific devices:
      # - MESHSAT_MESHTASTIC_PORT=/dev/ttyACM0
      # - MESHSAT_IRIDIUM_PORT=/dev/ttyUSB0
    volumes:
      - meshsat-data:/data
      - /dev:/dev
      - /sys:/sys:ro
    restart: unless-stopped

volumes:
  meshsat-data:
