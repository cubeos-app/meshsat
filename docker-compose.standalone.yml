# True standalone mode — direct serial, no HAL sidecar required.
# Usage: docker compose -f docker-compose.standalone.yml up --build
services:
  meshsat:
    build: .
    ports:
      - "6050:6050"
    privileged: true
    environment:
      - MESHSAT_MODE=direct
      - MESHSAT_PORT=6050
      - MESHSAT_DB_PATH=/data/meshsat.db
    volumes:
      - meshsat-data:/data
      - /dev:/dev
      - /sys:/sys:ro
    restart: unless-stopped

volumes:
  meshsat-data:
