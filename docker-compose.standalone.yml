# True standalone mode — direct serial, no HAL sidecar required.
# Usage: docker compose -f docker-compose.standalone.yml up --build
services:
  meshsat:
    build: .
    ports:
      - "6050:6050"
    privileged: true
    environment:
      - MESHSAT_MODE=direct
      - MESHSAT_PORT=6050
      - MESHSAT_DB_PATH=/data/meshsat.db
      - MESHSAT_IRIDIUM_PORT=${MESHSAT_IRIDIUM_PORT:-auto}
      - MESHSAT_IMT_PORT=${MESHSAT_IMT_PORT:-auto}
      - MESHSAT_MESHTASTIC_PORT=${MESHSAT_MESHTASTIC_PORT:-auto}
      - MESHSAT_CELLULAR_PORT=${MESHSAT_CELLULAR_PORT:-auto}
    volumes:
      - meshsat-data:/data
      - /dev:/dev
      - /sys:/sys:ro
    restart: unless-stopped

volumes:
  meshsat-data:
