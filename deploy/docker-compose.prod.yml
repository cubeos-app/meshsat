# MeshSat Hub — Production Docker Compose
#
# Usage:
#   cp .env.example .env   # edit with your domain and settings
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - Docker Engine 24+ with Compose v2
#   - Public DNS A record pointing to this server
#   - Ports 80 and 443 open (Caddy handles TLS)
#   - Port 8883 open if external MQTT/TLS is needed

services:
  # ── MeshSat Hub ──────────────────────────────────────────────
  meshsat:
    image: ghcr.io/cubeos-app/meshsat:${MESHSAT_TAG:-latest}
    restart: unless-stopped
    environment:
      - MESHSAT_MODE=direct
      - MESHSAT_PORT=6050
      - MESHSAT_DB_PATH=/cubeos/data/meshsat.db
      - MESHSAT_RETENTION_DAYS=${MESHSAT_RETENTION_DAYS:-90}
      - MESHSAT_BACKUP_DIR=/cubeos/data/backups
      - MESHSAT_BACKUP_INTERVAL_HOURS=${MESHSAT_BACKUP_INTERVAL_HOURS:-12}
      - MESHSAT_BACKUP_MAX_KEEP=${MESHSAT_BACKUP_MAX_KEEP:-14}
      - MESHSAT_PAID_RATE_LIMIT=${MESHSAT_PAID_RATE_LIMIT:-60}
      - MESHSAT_ANNOUNCE_INTERVAL=${MESHSAT_ANNOUNCE_INTERVAL:-300}
      # NATS JetStream message bus (connects to nats service)
      - HUB_NATS_URL=nats://nats:4222
      # WireGuard VPN peer management (MESHSAT-119)
      - HUB_VPN_ENABLED=${HUB_VPN_ENABLED:-false}
      - HUB_VPN_API_URL=http://wg-rest-api:5000
      - HUB_VPN_API_USER=${WG_API_USER:-admin}
      - HUB_VPN_API_PASSWORD=${WG_API_PASSWORD:-}
      # Optional sidecars (uncomment to enable)
      # - MESHSAT_LLAMAZIP_ADDR=llamazip:50051
      # - MESHSAT_MSVQSC_ADDR=msvqsc:50052
    volumes:
      - meshsat-data:/cubeos/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:6050/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ── Caddy Reverse Proxy ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal
    environment:
      - DOMAIN=${DOMAIN:?Set DOMAIN in .env}
    depends_on:
      meshsat:
        condition: service_healthy

  # ── NATS Server (JetStream + MQTT adapter) ──────────────────
  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: >
      --jetstream
      --store_dir /data
      --mqtt_port 1883
      --cluster_name meshsat
    ports:
      - "4222:4222"       # NATS client
      - "1883:1883"       # MQTT adapter (field devices connect here unchanged)
      - "8222:8222"       # NATS monitoring
    volumes:
      - nats-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8222/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── WireGuard VPN (wg-easy + REST API) ───────────────────────
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - WG_HOST=${DOMAIN:?Set DOMAIN in .env}
      - WG_PORT=${WG_PORT:-51820}
      - WG_DEFAULT_DNS=${WG_DEFAULT_DNS:-1.1.1.1}
      - WG_DEFAULT_ADDRESS=${WG_DEFAULT_ADDRESS:-10.42.25.x}
      - WG_ALLOWED_IPS=${WG_ALLOWED_IPS:-10.42.25.0/24}
      - WG_PERSISTENT_KEEPALIVE=${WG_PERSISTENT_KEEPALIVE:-25}
      - PASSWORD_HASH=${WG_PASSWORD_HASH:-}
      - LANG=en
    ports:
      - "${WG_PORT:-51820}:51820/udp"
    volumes:
      - wg-data:/etc/wireguard
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wg", "show", "wg0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  wg-rest-api:
    image: ngoduykhanh/wireguard-ui:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      - WGUI_USERNAME=${WG_API_USER:-admin}
      - WGUI_PASSWORD=${WG_API_PASSWORD:-}
      - WGUI_MANAGE_START=false
      - WGUI_MANAGE_RESTART=false
      - BIND_ADDRESS=0.0.0.0:5000
      - WGUI_DNS=${WG_DEFAULT_DNS:-1.1.1.1}
      - WGUI_DEFAULT_CLIENT_ALLOWED_IPS=${WG_ALLOWED_IPS:-10.42.25.0/24}
      - WGUI_ENDPOINT_ADDRESS=${DOMAIN:?Set DOMAIN in .env}
      - WGUI_SERVER_LISTEN_PORT=${WG_PORT:-51820}
    volumes:
      - wg-data:/etc/wireguard
    networks:
      - internal
    depends_on:
      wg-easy:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

volumes:
  meshsat-data:
  caddy-data:
  caddy-config:
  nats-data:
  wg-data:

networks:
  internal:
    driver: bridge
