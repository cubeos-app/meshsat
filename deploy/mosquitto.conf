# MeshSat Hub — Mosquitto MQTT Broker Configuration
#
# Two listeners:
#   1883 — plaintext MQTT (internal network / LAN only)
#   8883 — TLS MQTT (for field devices over the internet)
#
# For TLS on 8883, uncomment the certfile/keyfile lines below and
# provide certificates (e.g., from Let's Encrypt via Caddy or certbot).

# ── General ────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_type warning
log_type error
log_type notice

# ── Listener 1: Internal (plaintext) ──────────────────────────
listener 1883
protocol mqtt
# Allow anonymous for internal Docker network; set to false + add
# password_file for multi-tenant or internet-exposed setups.
allow_anonymous true

# ── Listener 2: TLS (internet-facing) ─────────────────────────
# Uncomment and configure for encrypted MQTT from field devices:
#
# listener 8883
# protocol mqtt
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# require_certificate false
# allow_anonymous false
# password_file /mosquitto/config/passwd

# ── Performance ────────────────────────────────────────────────
max_inflight_messages 20
max_queued_messages 1000
message_size_limit 1048576

# ── Retained messages ─────────────────────────────────────────
# Field devices publish retained status; keep the store reasonable.
autosave_interval 300
